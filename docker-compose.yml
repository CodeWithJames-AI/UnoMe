name: unome

services:
  postgres:
    image: postgres:17
    container_name: unome-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-buildingai}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - unome-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    container_name: unome-redis
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - unome-redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  unome-api:
    build:
      context: ./buildingai
      dockerfile: Dockerfile
    container_name: unome-api
    restart: on-failure:3
    working_dir: /app
    ports:
      - "${SERVER_PORT:-4090}:${SERVER_PORT:-4090}"
    environment:
      SERVER_PORT: ${SERVER_PORT:-4090}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-buildingai}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  openwork:
    build:
      context: ./openwork
      dockerfile: Dockerfile
    container_name: unome-openwork
    restart: on-failure:3
    ports:
      - "4091:4091"
    environment:
      OPENWORK_PORT: 4091
      JWT_SECRET: ${JWT_SECRET:-unome-dev-secret}

volumes:
  unome-pgdata:
  unome-redisdata:
